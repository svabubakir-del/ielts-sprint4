<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;}
body{

/* starfield */

.shell{position:relative;z-index:1;display:flex;flex-direction:column;min-height:100vh;}
header{padding:20px 24px 0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}

.back-link{color:#94a3b8;font-size:13px;font-weight:600;text-decoration:none;}
.back-link:hover{color:#7dd3fc;}

/* main area */
main{flex:1;display:flex;flex-direction:column;align-items:center;padding:24px 16px 40px;}

/* day selector */
.day-tabs{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:24px;}
.day-tab{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#94a3b8;border-radius:8px;padding:7px 16px;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.day-tab:hover{background:rgba(125,211,252,.1);border-color:rgba(125,211,252,.3);color:#7dd3fc;}
.day-tab.active{background:rgba(125,211,252,.2);border-color:#7dd3fc;color:#7dd3fc;}
.day-tab.all-tab{background:rgba(167,139,250,.15);border-color:rgba(167,139,250,.4);color:#c4b5fd;}
.day-tab.all-tab.active{background:rgba(167,139,250,.3);border-color:#c4b5fd;color:#c4b5fd;}

/* progress */
.progress-wrap{width:100%;max-width:600px;margin-bottom:20px;}
.progress-label{display:flex;justify-content:space-between;font-size:13px;color:#64748b;margin-bottom:6px;}
.progress-bar{background:rgba(255,255,255,.08);border-radius:999px;height:6px;overflow:hidden;}
.progress-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#7dd3fc,#c4b5fd);transition:width .4s ease;}

.stats-row{display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap;justify-content:center;}
.stat{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:10px 18px;text-align:center;min-width:90px;}
.stat-n{font-size:24px;font-weight:800;line-height:1;}
.stat-l{font-size:11px;color:#64748b;margin-top:2px;text-transform:uppercase;letter-spacing:.5px;}
.stat-n.green{color:#4ade80;}
.stat-n.amber{color:#fbbf24;}
.stat-n.muted{color:#475569;}

/* flashcard */
.card-area{width:100%;max-width:600px;perspective:1400px;margin-bottom:24px;}
.card-outer{width:100%;aspect-ratio:5/3;position:relative;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.175,.885,.32,1.1);cursor:pointer;}
.card-outer.flipped{transform:rotateY(180deg);}
.card-face{
  position:absolute;inset:0;border-radius:20px;padding:28px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  border:1px solid rgba(255,255,255,.08);

.card-front{background:linear-gradient(135deg,rgba(30,45,64,.95),rgba(15,32,39,.95));}
.card-back{background:linear-gradient(135deg,rgba(20,30,50,.97),rgba(10,20,34,.97));transform:rotateY(180deg);}
.card-day-tag{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#475569;margin-bottom:12px;}
.card-word{font-size:clamp(22px,5vw,38px);font-weight:800;color:#e2e8f0;line-height:1.15;margin-bottom:8px;}
.card-pos{font-size:13px;color:#64748b;font-style:italic;}
.card-tap{font-size:12px;color:#334155;margin-top:16px;}
.card-def{font-size:clamp(14px,3.5vw,17px);color:#c8d6e8;line-height:1.6;max-width:420px;}
.card-ex{font-size:13px;color:#4d6580;margin-top:14px;font-style:italic;line-height:1.5;}

/* action buttons */
.action-row{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;justify-content:center;}
.action-btn{border:none;border-radius:12px;padding:12px 28px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:7px;}
.btn-know{background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;box-shadow:0 4px 16px rgba(22,163,74,.3);}
.btn-know:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(22,163,74,.4);}
.btn-again{background:linear-gradient(135deg,#c2410c,#b91c1c);color:#fff;box-shadow:0 4px 16px rgba(185,28,28,.3);}
.btn-again:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(185,28,28,.4);}
.btn-skip{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#94a3b8;}
.btn-skip:hover{background:rgba(255,255,255,.1);}
.action-btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important;}

/* controls row */
.controls-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center;margin-bottom:24px;}
.ctrl-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#94a3b8;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;}
.ctrl-btn:hover{background:rgba(255,255,255,.1);color:#e2e8f0;}
.ctrl-btn.active{background:rgba(167,139,250,.2);border-color:rgba(167,139,250,.4);color:#c4b5fd;}

/* results */
.results{display:none;width:100%;max-width:600px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:32px;text-align:center;}
.results.show{display:block;}
.results h2{font-size:28px;margin-bottom:8px;}
.results p{color:#64748b;margin-bottom:24px;}
.result-ring{width:100px;height:100px;border-radius:50%;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;border:4px solid #4ade80;color:#4ade80;}
.results-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.res-btn{border:none;border-radius:10px;padding:11px 22px;font-size:14px;font-weight:700;cursor:pointer;}
.res-btn.primary{background:linear-gradient(135deg,#7dd3fc,#6366f1);color:#0f172a;}
.res-btn.secondary{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:#e2e8f0;}

/* word count chip */
.word-count{background:rgba(125,211,252,.1);border:1px solid rgba(125,211,252,.2);color:#7dd3fc;border-radius:999px;padding:4px 12px;font-size:12px;font-weight:700;margin-bottom:20px;}
</style>

// ─── STATE ─────────────────────────────────────────────
var deck = [], known = 0, again = 0, idx = 0, flipped = false, showEx = true;
var currentFilter = 'all';
var audioCtx = null, musicOn = false, musicNodes = [];

// ─── STARS ─────────────────────────────────────────────
(function createStars(){
  var c = document.getElementById('stars');
  for(var i=0;i<80;i++){
    var s=document.createElement('div');
    s.className='star';
    var sz=Math.random()*2.5+0.5;
    s.style.cssText='width:'+sz+'px;height:'+sz+'px;top:'+Math.random()*100+'%;left:'+Math.random()*100+'%;animation-duration:'+(2+Math.random()*4)+'s;animation-delay:'+(Math.random()*4)+'s;opacity:'+(0.1+Math.random()*0.4);
    c.appendChild(s);
  }
})();

// ─── DECK MANAGEMENT ───────────────────────────────────
function filterDay(day){
  currentFilter = day;
  document.querySelectorAll('.day-tab').forEach(function(b){b.classList.remove('active');});
  event.target.classList.add('active');
  resetDeck();
}
function resetDeck(){
  var src = currentFilter==='all' ? VOCAB : VOCAB.filter(function(c){return c.d===currentFilter;});
  deck = src.map(function(c,i){return {card:c,idx:i};});
  known=0; again=0; idx=0; flipped=false;
  document.getElementById('results').classList.remove('show');
  document.getElementById('cardArea').style.display='';
  document.getElementById('actionRow').style.display='';
  shuffleDeck();
  updateUI();
}
function shuffleDeck(){
  for(var i=deck.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var t=deck[i]; deck[i]=deck[j]; deck[j]=t;
  }
  idx=0; flipped=false; updateUI();
}
function shuffle(){resetDeck(); shuffleDeck();}

// ─── CARD UI ───────────────────────────────────────────
function updateUI(){
  if(deck.length===0||idx>=deck.length){showResults();return;}
  var c=deck[idx].card;
  document.getElementById('cardDayTag').textContent='Day '+c.d+' · '+c.t;
  document.getElementById('cardWord').textContent=c.w;
  document.getElementById('cardPos').textContent=c.pos;
  document.getElementById('cardDef').textContent=c.def;
  document.getElementById('cardEx').textContent=showEx?'"'+c.ex+'"':'';
  document.getElementById('cardEx').style.display=showEx?'':'none';
  // reset flip
  flipped=false;
  document.getElementById('cardOuter').classList.remove('flipped');
  document.getElementById('btnKnow').disabled=true;
  document.getElementById('btnAgain').disabled=true;
  // progress
  var total=VOCAB.filter(function(v){return currentFilter==='all'||v.d===currentFilter;}).length;
  var done=known+again;
  var pct=total>0?Math.round(done/total*100):0;
  document.getElementById('progressText').textContent='Card '+(idx+1)+' of '+deck.length;
  document.getElementById('progressPct').textContent=pct+'%';
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('knownN').textContent=known;
  document.getElementById('againN').textContent=again;
  document.getElementById('leftN').textContent=deck.length-idx;
}
function flipCard(){
  flipped=!flipped;
  document.getElementById('cardOuter').classList.toggle('flipped',flipped);
  if(flipped){
    document.getElementById('btnKnow').disabled=false;
    document.getElementById('btnAgain').disabled=false;
  }
}
function markKnown(){known++;idx++;flipped=false;updateUI();}
function markAgain(){
  again++;
  // move current card to the end of remaining deck
  var cur=deck.splice(idx,1)[0];
  deck.push(cur);
  flipped=false;updateUI();
}
function nextCard(){idx++;flipped=false;updateUI();}
function toggleEx(){
  showEx=!showEx;
  var btn=document.getElementById('showExBtn');
  btn.textContent='Examples: '+(showEx?'On':'Off');
  btn.classList.toggle('active',showEx);
  if(flipped){
    var c=deck[idx].card;
    document.getElementById('cardEx').textContent=showEx?'"'+c.ex+'"':'';
    document.getElementById('cardEx').style.display=showEx?'':'none';
  }
}

// ─── RESULTS ───────────────────────────────────────────
function showResults(){
  document.getElementById('cardArea').style.display='none';
  document.getElementById('actionRow').style.display='none';
  var total=known+again;
  var pct=total>0?Math.round(known/total*100):0;
  document.getElementById('resultRing').textContent=pct+'%';
  var title=pct===100?'Perfect — flawless round! 🌟':pct>=80?'Excellent work! 🎉':pct>=60?'Good progress! 💪':'Keep going — you\'ll get there! 📚';
  document.getElementById('resultTitle').textContent=title;
  document.getElementById('resultSub').textContent='You knew '+known+' of '+total+' words.'+(again>0?' '+again+' marked for review.':'');
  document.getElementById('results').classList.add('show');
}
function reviewAgain(){
  // only keep the cards that were marked for review
  var toReview=deck.filter(function(c){return true;}); // they're all at end
  if(again===0){resetDeck();return;}
  // start fresh but only the again cards are at the back; just reset
  var src=currentFilter==='all'?VOCAB:VOCAB.filter(function(c){return c.d===currentFilter;});
  deck=src.map(function(c,i){return {card:c,idx:i};});
  known=0;again=0;idx=0;flipped=false;
  document.getElementById('results').classList.remove('show');
  document.getElementById('cardArea').style.display='';
  document.getElementById('actionRow').style.display='';
  shuffleDeck();updateUI();
}

// ─── AMBIENT MUSIC ─────────────────────────────────────
function toggleMusic(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  musicOn=!musicOn;
  document.getElementById('musicBtn').textContent='♪ Music: '+(musicOn?'On':'Off');
  if(musicOn){startMusic();}else{stopMusic();}
}
function stopMusic(){
  musicNodes.forEach(function(n){try{n.stop();}catch(e){}});
  musicNodes=[];
}
function startMusic(){
  stopMusic();
  // Gentle ambient drone — Am chord + slow LFO
  var masterGain=audioCtx.createGain();
  masterGain.gain.setValueAtTime(0,audioCtx.currentTime);
  masterGain.gain.linearRampToValueAtTime(0.07,audioCtx.currentTime+3);
  masterGain.connect(audioCtx.destination);

  var reverb=audioCtx.createConvolver();
  var len=audioCtx.sampleRate*2;
  var buf=audioCtx.createBuffer(2,len,audioCtx.sampleRate);
  for(var ch=0;ch<2;ch++){var d=buf.getChannelData(ch);for(var i=0;i<len;i++){d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2);}}
  reverb.buffer=buf;
  reverb.connect(masterGain);

  // Notes: A2,E3,A3,C4,E4,G4 — Am7 chord, very soft
  var freqs=[110,165,220,261.6,329.6,392];
  freqs.forEach(function(freq,fi){
    var osc=audioCtx.createOscillator();
    var gain=audioCtx.createGain();
    osc.type='sine';
    osc.frequency.value=freq;
    // slight detune for warmth
    osc.detune.value=(fi%2===0?-5:5);
    // slow LFO on gain
    var lfo=audioCtx.createOscillator();
    var lfoGain=audioCtx.createGain();
    lfo.frequency.value=0.03+fi*0.007;
    lfoGain.gain.value=0.006;
    lfo.connect(lfoGain);
    lfoGain.connect(gain.gain);
    lfo.start();
    gain.gain.value=0.012/(fi+1);
    osc.connect(gain);
    gain.connect(reverb);
    osc.start();
    musicNodes.push(osc);
    musicNodes.push(lfo);
  });
}

// ─── KEYBOARD ──────────────────────────────────────────
document.addEventListener('keydown',function(e){
  if(e.key===' '||e.key==='Enter'){if(deck.length&&idx<deck.length){flipCard();e.preventDefault();}}
  if(e.key==='ArrowRight'||e.key==='1'){if(!document.getElementById('btnKnow').disabled)markKnown();}
  if(e.key==='ArrowLeft'||e.key==='2'){if(!document.getElementById('btnAgain').disabled)markAgain();}
});

// ─── INIT ──────────────────────────────────────────────
resetDeck();
</script>
