<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard — IELTS Sprint4</title>
<style>
  :root{
    --accent:#0F5C6B; --accent-dark:#0c4a57; --accent-light:#e6eef0;
    --bg:#f7f8fa; --card:#ffffff; --border:#e2e4e8;
    --text:#1a1a1a; --muted:#6b7280;
    --success:#1f9d55; --success-bg:#e6f6ec;
    --locked-bg:#eceef1; --locked-text:#9aa1a9;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  }
  .topbar{
    display:flex; align-items:center; gap:16px; padding:14px 24px;
    background:var(--card); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:5;
  }
  .brand{ font-weight:800; font-size:19px; }
  .brand span{ color:var(--accent); }
  .who{ margin-left:auto; display:flex; align-items:center; gap:14px; }
  .who .name{ font-weight:700; font-size:14px; }
  .who .group{ color:var(--muted); font-size:13px; }
  .logout-btn{
    background:#fff; border:1px solid var(--border); border-radius:7px; padding:8px 14px;
    font-size:13.5px; font-weight:700; color:var(--accent); cursor:pointer;
  }
  .logout-btn:hover{ background:var(--accent-light); }

  .hero{ max-width:1100px; margin:0 auto; padding:32px 24px 8px; }
  .hero h1{ font-size:26px; margin:0 0 6px; }
  .hero p{ color:var(--muted); font-size:14.5px; margin:0; }

  .progress-summary{
    max-width:1100px; margin:18px auto 0; padding:0 24px;
  }
  .summary-bar{
    background:var(--card); border:1px solid var(--border); border-radius:10px; padding:16px 20px;
    display:flex; align-items:center; gap:16px;
  }
  .summary-track{ flex:1; height:10px; background:var(--locked-bg); border-radius:999px; overflow:hidden; }
  .summary-fill{ height:100%; background:var(--accent); border-radius:999px; transition:width .3s; }
  .summary-text{ font-size:13.5px; font-weight:700; color:var(--accent-dark); white-space:nowrap; }

  .grid-wrap{ max-width:1100px; margin:0 auto; padding:24px; }
  .day-grid{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(160px, 1fr)); gap:18px;
  }
  .day-card{
    display:block; background:var(--card); border:1px solid var(--border); border-radius:12px;
    padding:18px 16px; text-decoration:none; color:var(--text); position:relative;
    transition:transform .15s, box-shadow .15s; min-height:118px;
  }
  .day-card:hover{ transform:translateY(-2px); box-shadow:0 6px 16px rgba(0,0,0,.07); }
  .day-card.locked{
    background:var(--locked-bg); color:var(--locked-text); cursor:not-allowed; pointer-events:none;
  }
  .day-card.relax{ border-color:#f0c36d; }
  .day-title{ font-size:17px; font-weight:800; margin:0 0 12px; padding-right:26px; }
  .day-card.relax .day-title::after{ content:" 🌿"; }
  .day-progress-track{ height:6px; background:var(--locked-bg); border-radius:999px; overflow:hidden; margin-bottom:6px; }
  .day-card.locked .day-progress-track{ background:#dfe2e6; }
  .day-progress-fill{ height:100%; background:var(--success); border-radius:999px; }
  .day-progress-label{ font-size:11.5px; color:var(--muted); font-weight:600; }
  .day-card.locked .day-progress-label{ color:var(--locked-text); }
  .lock-icon{ position:absolute; top:16px; right:14px; font-size:15px; }
  .complete-badge{
    position:absolute; top:12px; right:12px; background:var(--success-bg); color:var(--success);
    font-size:11px; font-weight:800; padding:3px 8px; border-radius:999px;
  }

  .empty-state{ text-align:center; padding:60px 20px; color:var(--muted); }
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">IELTS <span>Sprint4</span></div>
  <div class="who">
    <div>
      <div class="name" id="studentName">—</div>
      <div class="group" id="studentGroup">—</div>
    </div>
    <button class="logout-btn" onclick="logout()">Log out</button>
  </div>
</header>

<div class="hero">
  <h1>Your 30-Day Programme</h1>
  <p>Complete each day's 9 tasks. Days 7, 14, 21 and 28 are light relax days.</p>
</div>

<div class="progress-summary">
  <div class="summary-bar">
    <div class="summary-text" id="summaryText">0 / 30 days complete</div>
    <div class="summary-track"><div class="summary-fill" id="summaryFill" style="width:0%"></div></div>
  </div>
</div>

<div class="grid-wrap">
  <div class="day-grid" id="dayGrid"></div>
</div>

<script src="supabase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
  "use strict";
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const RELAX_DAYS = [7, 14, 21, 28];
  const TASKS_PER_DAY = 9;
  const TOTAL_DAYS = 30;

  /* ---------------- SESSION CHECK ---------------- */
  const sessionRaw = sessionStorage.getItem('sprint4_session');
  if(!sessionRaw){
    window.location.href = 'index.html';
    throw new Error('no session');
  }
  const session = JSON.parse(sessionRaw);
  if(session.role !== 'student'){
    window.location.href = 'index.html';
    throw new Error('wrong role');
  }

  document.getElementById('studentName').textContent = session.name || 'Student';

  function logout(){
    sessionStorage.removeItem('sprint4_session');
    window.location.href = 'index.html';
  }
  window.logout = logout;

  /* ---------------- LOAD GROUP NAME ---------------- */
  (async function loadGroup(){
    if(!session.groupId) return;
    const { data } = await supabase.from('groups').select('name').eq('id', session.groupId).maybeSingle();
    if(data) document.getElementById('studentGroup').textContent = data.name;
  })();

  /* ---------------- BUILD DAY GRID ---------------- */
  const grid = document.getElementById('dayGrid');

  function taskCountForDay(day){
    return RELAX_DAYS.includes(day) ? 1 : TASKS_PER_DAY;
  }

  function buildSkeleton(){
    let html = '';
    for(let d=1; d<=TOTAL_DAYS; d++){
      const isRelax = RELAX_DAYS.includes(d);
      html += `<a href="#" class="day-card locked ${isRelax?'relax':''}" id="dayCard${d}">
        <div class="lock-icon" id="dayLock${d}">🔒</div>
        <div class="day-title">${isRelax ? 'Relax Day' : 'Day ' + d}</div>
        <div class="day-progress-track"><div class="day-progress-fill" id="dayFill${d}" style="width:0%"></div></div>
        <div class="day-progress-label" id="dayLabel${d}">0 / ${taskCountForDay(d)} tasks</div>
      </a>`;
    }
    grid.innerHTML = html;
  }
  buildSkeleton();

  /* ---------------- LOAD AVAILABILITY + PROGRESS ---------------- */
  async function loadDashboard(){
    const { data: availability } = await supabase.from('day_availability').select('day, is_open');
    const openDays = new Set((availability || []).filter(r => r.is_open).map(r => r.day));

    const { data: progressRows } = await supabase
      .from('progress')
      .select('day, task, completed')
      .eq('student_id', session.id)
      .eq('completed', true);

    const completedByDay = {};
    (progressRows || []).forEach(r => {
      completedByDay[r.day] = (completedByDay[r.day] || 0) + 1;
    });

    let daysFullyComplete = 0;

    for(let d=1; d<=TOTAL_DAYS; d++){
      const isOpen = openDays.has(d);
      const total = taskCountForDay(d);
      const done = Math.min(completedByDay[d] || 0, total);
      const pct = Math.round((done/total)*100);

      const cardEl = document.getElementById('dayCard'+d);
      const lockEl = document.getElementById('dayLock'+d);
      const fillEl = document.getElementById('dayFill'+d);
      const labelEl = document.getElementById('dayLabel'+d);

      fillEl.style.width = pct + '%';
      labelEl.textContent = done + ' / ' + total + ' tasks';

      if(isOpen){
        cardEl.classList.remove('locked');
        cardEl.href = 'day' + d + '.html';
        lockEl.remove();
        if(done >= total){
          daysFullyComplete++;
          const badge = document.createElement('div');
          badge.className = 'complete-badge';
          badge.textContent = '✓ Done';
          cardEl.appendChild(badge);
        }
      }
    }

    document.getElementById('summaryText').textContent = daysFullyComplete + ' / ' + TOTAL_DAYS + ' days complete';
    document.getElementById('summaryFill').style.width = Math.round((daysFullyComplete/TOTAL_DAYS)*100) + '%';
  }

  loadDashboard().catch(function(err){
    console.error(err);
  });
})();
</script>
</body>
</html>
