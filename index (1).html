<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — IELTS Sprint4</title>
<style>
  :root{
    --accent:#0F5C6B; --accent-dark:#0c4a57;
    --bg:#f7f8fa; --card:#ffffff; --border:#e2e4e8;
    --text:#1a1a1a; --muted:#6b7280;
    --danger:#d23a3a; --danger-bg:#fbeaea;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
    display:flex; align-items:center; justify-content:center; padding:24px;
  }
  .card{
    background:var(--card); border:1px solid var(--border); border-radius:14px;
    padding:36px 32px; max-width:400px; width:100%; box-shadow:0 4px 24px rgba(0,0,0,.06);
  }
  .brand{ font-weight:800; font-size:20px; margin-bottom:4px; }
  .brand span{ color:var(--accent); }
  .sub{ color:var(--muted); font-size:14px; margin-bottom:26px; }
  label{ display:block; font-size:13.5px; font-weight:700; margin-bottom:6px; color:var(--accent-dark); }
  input{
    width:100%; font:inherit; font-size:15px; padding:11px 13px; margin-bottom:18px;
    border:1px solid #c7ccd2; border-radius:8px; background:#fff; color:var(--text);
  }
  input:focus{ outline:2px solid var(--accent); border-color:var(--accent); }
  button{
    width:100%; background:var(--accent); color:#fff; border:none; border-radius:8px;
    padding:13px; font-size:15px; font-weight:700; cursor:pointer;
  }
  button:hover{ background:var(--accent-dark); }
  button:disabled{ background:#cfd3d8; cursor:not-allowed; }
  .msg{ margin-top:16px; padding:12px 14px; border-radius:8px; font-size:14px; display:none; }
  .msg.error{ display:block; background:var(--danger-bg); color:var(--danger); }
  .register-link{ margin-top:20px; text-align:center; font-size:14px; color:var(--muted); }
  .register-link a{ color:var(--accent); font-weight:700; text-decoration:none; }
</style>
</head>
<body>

<div class="card">
  <div class="brand">IELTS <span>Sprint4</span></div>
  <div class="sub">Log in to continue</div>

  <form id="loginForm">
    <label for="username">Username</label>
    <input type="text" id="username" autocomplete="username" required>

    <label for="password">Password</label>
    <input type="password" id="password" autocomplete="current-password" required>

    <button type="submit" id="submitBtn">Log in</button>
  </form>

  <div class="msg" id="msg"></div>

  <div class="register-link">New student? <a href="register.html">Register here</a></div>
</div>

<script src="supabase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
  "use strict";
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const form = document.getElementById('loginForm');
  const msgEl = document.getElementById('msg');
  const submitBtn = document.getElementById('submitBtn');

  function showMsg(text){
    msgEl.textContent = text;
    msgEl.className = text ? 'msg error' : 'msg';
  }

  form.addEventListener('submit', async function(e){
    e.preventDefault();
    submitBtn.disabled = true;
    showMsg('');

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();

    if(!username || !password){
      showMsg('Please enter both username and password.');
      submitBtn.disabled = false;
      return;
    }

    try{
      // 1. Check super admin
      const { data: admin } = await supabase
        .from('admins').select('id, username')
        .eq('username', username).eq('password', password).maybeSingle();
      if(admin){
        sessionStorage.setItem('sprint4_session', JSON.stringify({ role:'admin', id:admin.id, username:admin.username }));
        window.location.href = 'super-admin-dashboard.html';
        return;
      }

      // 2. Check teacher / mentor
      const { data: teacher } = await supabase
        .from('teachers').select('id, full_name, username, is_mentor')
        .eq('username', username).eq('password', password).maybeSingle();
      if(teacher){
        sessionStorage.setItem('sprint4_session', JSON.stringify({ role:'teacher', id:teacher.id, name:teacher.full_name, isMentor: teacher.is_mentor }));
        window.location.href = 'teacher-dashboard.html';
        return;
      }

      // 3. Check student
      const { data: student } = await supabase
        .from('students').select('id, full_name, username, group_id')
        .eq('username', username).eq('password', password).maybeSingle();
      if(student){
        sessionStorage.setItem('sprint4_session', JSON.stringify({ role:'student', id:student.id, name:student.full_name, groupId: student.group_id }));
        window.location.href = 'student-dashboard.html';
        return;
      }

      showMsg('Username or password is incorrect.');
      submitBtn.disabled = false;

    }catch(err){
      showMsg('Unexpected error: ' + err.message);
      submitBtn.disabled = false;
    }
  });
})();
</script>
</body>
</html>
